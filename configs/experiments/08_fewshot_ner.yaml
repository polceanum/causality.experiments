name: 08_fewshot_ner
seed: 18
dataset:
  kind: fewshot_ner_tiny
  n: 720
  length: 12
method:
  kind: erm
  hidden_dim: 48
  embedding_dim: 16
training:
  device: cpu
  epochs: 25
  batch_size: 64
  lr: 0.001
metrics:
  - accuracy
  - worst_group_accuracy
  - support_recovery
  - ate_proxy_error
output_dir: outputs/runs
