name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas matplotlib pyyaml typer pytest
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run regression tests
        run: python -m pytest

      - name: Run CLI smoke test
        run: |
          python -m causality_experiments run \
            --config configs/experiments/01_synthetic_linear.yaml \
            --output-dir /tmp/causality-runs
          python -m causality_experiments summarize --runs /tmp/causality-runs
